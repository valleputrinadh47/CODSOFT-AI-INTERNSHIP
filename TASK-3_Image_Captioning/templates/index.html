<!DOCTYPE html>
<html>

<head>
    <title>AI Image Captioning</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🖼 AI Image Captioning</h1>

        <form method="POST" enctype="multipart/form-data">

            <input type="file" name="image" accept="image/*" required>

            <button type="submit">
                Generate Caption
            </button>

        </form>

        {% if error %}
            <div class="result error">
                <p>{{ error }}</p>
            </div>
        {% endif %}

        {% if image_url %}
            <div class="result">
                <h2>Uploaded Image</h2>
                <img src="{{ image_url }}" alt="Uploaded image preview" class="preview-image">
            </div>
        {% endif %}

        {% if caption %}
            <div class="result">
                <h2>Generated Caption</h2>
                <p id="caption-text">{{ caption }}</p>
                <button type="button" id="copy-button">📋 Copy Caption</button>
            </div>
        {% endif %}

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const copyButton = document.getElementById('copy-button');
                if (copyButton) {
                    copyButton.addEventListener('click', async function() {
                        const captionText = document.getElementById('caption-text').innerText;
                        try {
                            await navigator.clipboard.writeText(captionText);
                            copyButton.innerText = 'Copied!';
                            setTimeout(() => {
                                copyButton.innerText = '📋 Copy Caption';
                            }, 1500);
                        } catch (err) {
                            alert('Could not copy caption. Please copy it manually.');
                        }
                    });
                }
            });
        </script>

    </div>

</body>

</html>
