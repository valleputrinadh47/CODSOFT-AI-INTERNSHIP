<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🎬 CineMatch — AI Movie Recommendation System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   RESET & ROOT VARIABLES
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07070d;--bg1:#0f0f1a;--bg2:#181826;--bg3:#21212e;--bg4:#2b2b3a;
  --gold:#f5c842;--gold2:#c9a02a;--pink:#e84393;--blue:#4f8ef7;--green:#3ecf8e;
  --t1:#eeeef8;--t2:#9090a8;--t3:#52526a;
  --r:12px;--sh:0 8px 32px rgba(0,0,0,.55);--tr:.22s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 40% at 15% 0%,rgba(245,200,66,.06) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 85% 100%,rgba(79,142,247,.05) 0%,transparent 60%);z-index:0}

/* ═══════════════════════════════════════
   NAVBAR
═══════════════════════════════════════ */
.navbar{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:14px;
  padding:13px 28px;background:rgba(7,7,13,.88);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(245,200,66,.1)}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.brand-icon{font-size:1.5rem}
.brand-name{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:900;color:var(--gold)}
.brand-pill{font-size:.6rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--t3);border:1px solid var(--t3);border-radius:20px;padding:2px 7px}
.nav-search{position:relative;flex:1;max-width:440px}
.nav-search input{width:100%;padding:9px 16px;background:var(--bg2);border:1px solid var(--bg4);
  border-radius:50px;color:var(--t1);font-size:.875rem;outline:none;transition:border var(--tr);font-family:inherit}
.nav-search input:focus{border-color:var(--gold)}
.search-drop{position:absolute;top:110%;left:0;right:0;background:var(--bg2);
  border:1px solid var(--bg4);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);z-index:300}
.search-drop.hidden{display:none}
.dd-row{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;font-size:.85rem;transition:background var(--tr);border-bottom:1px solid var(--bg3)}
.dd-row:last-child{border-bottom:none}
.dd-row:hover{background:var(--bg3)}
.dd-row span{color:var(--t2);font-size:.75rem}
.nav-tabs{display:flex;gap:6px;margin-left:auto}
.nav-tab{padding:7px 14px;background:var(--bg2);border:1px solid var(--bg4);
  border-radius:50px;color:var(--t2);cursor:pointer;font-size:.82rem;transition:all var(--tr);font-family:inherit}
</style>
</head>
<body>
<div class="navbar">
  <a href="#" class="brand">
    <span class="brand-icon">🎬</span>
    <span class="brand-name">CineMatch</span>
    <span class="brand-pill">AI Powered</span>
  </a>
  <div class="nav-search">
    <input type="text" placeholder="Search movies..."/>
    <div class="search-drop hidden"></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab">Trending</button>
    <button class="nav-tab">My Recommendations</button>
  </div>
</div>
</body>
</html>
